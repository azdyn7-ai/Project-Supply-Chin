apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-service
  namespace: cnd-demo
  labels:
    app: feedback-service
    component: runtime-build-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feedback-service
  template:
    metadata:
      labels:
        app: feedback-service
    spec:
      serviceAccountName: enrichment-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: feedback-service
          image: ghcr.io/azdyn7-ai/project-supply-chin/feedback-service:latest
          ports:
            - containerPort: 8091
          env:
            - name: NAMESPACE
              value: "cnd-demo"
            - name: PORT
              value: "8091"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-service
  namespace: cnd-demo
spec:
  selector:
    app: feedback-service
  ports:
    - name: http
      port: 8091
      targetPort: 8091
