apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-service
  namespace: cnd-demo
  labels:
    app: enrichment-service
    component: provenance-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enrichment-service
  template:
    metadata:
      labels:
        app: enrichment-service
        component: provenance-bridge
    spec:
      serviceAccountName: enrichment-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: enrichment-service
          image: ghcr.io/azdyn7-ai/project-supply-chin/enrichment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: WATCH_NAMESPACE
              value: "cnd-demo"
            - name: PORT
              value: "8090"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: enrichment-service
  namespace: cnd-demo
spec:
  selector:
    app: enrichment-service
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enrichment-service-sa
  namespace: cnd-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enrichment-service-role
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enrichment-service-binding
subjects:
  - kind: ServiceAccount
    name: enrichment-service-sa
    namespace: cnd-demo
roleRef:
  kind: ClusterRole
  name: enrichment-service-role
  apiGroup: rbac.authorization.k8s.io
