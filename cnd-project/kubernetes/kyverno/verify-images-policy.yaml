apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signatures (Cosign/Sigstore)
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cnd-demo]
      verifyImages:
        - imageReferences:
            - "ghcr.io/azdyn7-ai/project-supply-chin/*"
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/azdyn7-ai/Project-Supply-Chin/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          mutateDigest: false
          verifyDigest: false
          required: true
    - name: verify-sbom-attestation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cnd-demo]
      verifyImages:
        - imageReferences:
            - "ghcr.io/azdyn7-ai/project-supply-chin/*"
          attestations:
            - type: https://cyclonedx.org/bom
              attestors:
                - entries:
                    - keyless:
                        subject: "https://github.com/azdyn7-ai/Project-Supply-Chin/*"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
    - name: verify-slsa-provenance
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cnd-demo]
      verifyImages:
        - imageReferences:
            - "ghcr.io/azdyn7-ai/project-supply-chin/*"
          attestations:
            - type: https://slsa.dev/provenance/v1
              attestors:
                - entries:
                    - keyless:
                        subject: "https://github.com/azdyn7-ai/Project-Supply-Chin/*"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
              conditions:
                - all:
                    - key: "{{ buildDefinition.buildType }}"
                      operator: Equals
                      value: "https://slsa-framework.github.io/github-actions-buildtypes/workflow/v1"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-unsigned-images
  annotations:
    policies.kyverno.io/title: Disallow Unsigned Images
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: restrict-image-registry
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cnd-demo]
      exclude:
        any:
          - resources:
              kinds: [Pod]
              selector:
                matchLabels:
                  cnd.security/attack-simulation: "true"
      validate:
        message: "Images must come from ghcr.io/azdyn7-ai/project-supply-chin"
        pattern:
          spec:
            containers:
              - image: "ghcr.io/azdyn7-ai/project-supply-chin/*"
