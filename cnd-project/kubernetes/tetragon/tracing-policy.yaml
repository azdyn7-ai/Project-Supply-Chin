apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: cnd-supply-chain-monitor
  namespace: kube-system
  labels:
    app: cnd-project
    component: tetragon-policy
  annotations:
    cnd.security/description: >
      Tetragon TracingPolicy for CND Project (Tetragon v1.1.0 compatible).
      Uses kprobes only — LSM hooks (spec.tracing / spec.lsmhooks) require
      Tetragon >= v1.3 with CONFIG_BPF_LSM=y kernel flag.
      Monitors process execution, file access, and network connections.
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: cnd-project

  # ── Monitor unauthorized process execution ─────────────────────────────────
  kprobes:
    - call: "sys_execve"
      syscall: true
      return: false
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "NotEqual"
              values:
                - "/cnd-app"
                - "/pause"
                - "/bin/sh"
          matchActions:
            - action: Sigkill
              argError: 1        # 1 = EPERM (integer required by Tetragon v1.1.0)

    # ── Monitor sensitive file access ───────────────────────────────────────
    - call: "sys_openat"
      syscall: true
      return: false
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/etc/shadow"
                - "/etc/passwd"
                - "/root/"
                - "/proc/1/"
          matchActions:
            - action: Post
              rateLimit: "1/min"

    # ── Monitor outbound network connections ────────────────────────────────
    - call: "sys_connect"
      syscall: true
      return: false
      args:
        - index: 0
          type: "int"
      selectors:
        - matchActions:
            - action: Post
              rateLimit: "10/min"
