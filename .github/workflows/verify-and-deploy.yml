name: Verify Supply Chain (Deploy Gate)

# ─────────────────────────────────────────────────────────────────────────────
# Independent verification gate. It re-verifies, from the consumer side, the
# same guarantees Kyverno enforces at admission time inside the cluster:
#   cosign signature  →  SBOM attestation  →  SLSA build provenance
# Runs automatically after a successful build on main, or on demand for any
# component. It does NOT talk to a cluster — deployment itself is performed by
# Kyverno admission control (see cnd-project/kubernetes/kyverno).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Build, Sign, SBOM & SLSA Provenance"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      component:
        description: Component image to verify
        default: cnd-demo-app
        type: choice
        options:
          - cnd-demo-app
          - enrichment-service
          - feedback-service

permissions:
  contents: read

jobs:
  verify:
    # Skip if the upstream build did not succeed
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      REGISTRY: ghcr.io
      COMPONENT: ${{ github.event.inputs.component || 'cnd-demo-app' }}
    steps:
      - name: Resolve image reference
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}/${COMPONENT}:latest" >> "$GITHUB_ENV"

      # GHCR packages are private until made public — authenticate so cosign and
      # `gh attestation verify` can pull the image and its referrers.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Cosign signature (keyless)
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/.+@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}"

      - name: Verify SBOM attestation (CycloneDX)
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/.+@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}"

      - name: Verify SLSA build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh attestation verify "oci://${IMAGE}" --repo "${GITHUB_REPOSITORY}"

      - name: Verification summary
        run: |
          {
            echo "### ✅ Supply chain verified"
            echo ""
            echo "Image \`${IMAGE}\` passed:"
            echo "- Cosign keyless signature"
            echo "- CycloneDX SBOM attestation"
            echo "- SLSA build provenance"
          } >> "$GITHUB_STEP_SUMMARY"
